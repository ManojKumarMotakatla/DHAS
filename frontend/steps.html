<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Counter - Digital Health Assistant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-4 text-center">

        <h3 class="mb-4">Step Counter</h3>

        <div class="card p-4 shadow-sm">

            <h1 id="stepCount">0</h1>

            <button class="btn btn-primary w-100 mt-3" onclick="addStep()">Add Step</button>
            <button class="btn btn-danger w-100 mt-2" onclick="resetSteps()">Reset</button>

        </div>

        <button class="btn btn-primary w-100 mt-3" onclick="goBack()">Back</button>

    </div>

    <!-- JS -->
    <script src="js/steps.js"></script>

</body>
</html>
