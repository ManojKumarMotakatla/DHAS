<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step Counter - DHAS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="dhas-navbar">
    <div class="brand">🏥 DHAS</div>
    <a href="dashboard.html" style="color:#fff;font-size:0.85rem;text-decoration:none;opacity:0.85;">← Dashboard</a>
  </nav>

  <div class="page-wrap">

    <h2 class="page-title">
      <span class="emoji">👟</span>
      Step Counter
    </h2>

    <div class="dhas-card text-center">

      <div class="steps-display" id="stepCount">0</div>
      <div class="steps-goal">Goal: <span id="goalDisplay">10,000</span> steps</div>

      <div class="steps-progress">
        <div class="steps-bar" id="progressBar" style="width:0%"></div>
      </div>

      <div class="text-muted" id="progressText" style="font-size:0.85rem; margin-bottom:16px;">0% of daily goal</div>

      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-dhas primary" style="width:auto;padding:12px 28px;" onclick="addStep()">+ Add Step</button>
        <button class="btn-dhas primary" style="width:auto;padding:12px 28px;background:var(--success);" onclick="addHundred()">+100 Steps</button>
        <button class="btn-dhas danger sm" onclick="resetSteps()">Reset</button>
      </div>

    </div>

    <!-- Stats Card -->
    <div class="dhas-card">
      <h5>📊 Today's Stats</h5>
      <div style="display:flex;justify-content:space-around;text-align:center;margin-top:8px;">
        <div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--primary)" id="calorieDisplay">0</div>
          <div class="text-muted" style="font-size:0.8rem;">Calories Burned</div>
        </div>
        <div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--accent)" id="kmDisplay">0.0</div>
          <div class="text-muted" style="font-size:0.8rem;">Km Walked</div>
        </div>
        <div>
          <div style="font-size:1.4rem;font-weight:700;color:var(--success)" id="minuteDisplay">0</div>
          <div class="text-muted" style="font-size:0.8rem;">Minutes Active</div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/steps.js"></script>

</body>
</html>
