<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language - Digital Health Assistant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-4 text-center">

        <h3 class="mb-4">Select Language</h3>

        <div class="card p-3 shadow-sm">

            <button class="btn btn-primary w-100 mb-2" onclick="setLanguage('English')">English</button>
            <button class="btn btn-primary w-100 mb-2" onclick="setLanguage('Hindi')">Hindi</button>
            <button class="btn btn-primary w-100" onclick="setLanguage('Telugu')">Telugu</button>

        </div>

        <p class="mt-3" id="selectedLang"></p>

        <button class="btn btn-primary w-100 mt-3" onclick="goBack()">Back</button>

    </div>

    <!-- JS -->
    <script src="js/language.js"></script>

</body>
</html>
