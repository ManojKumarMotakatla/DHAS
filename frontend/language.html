<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language - DHAS</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0b1437;
      --navy-mid:  #112057;
      --accent:    #2a6cf6;
      --accent-lt: #4f8ef9;
      --teal:      #00c9b1;
      --accent-bg: #eff6ff;
      --accent-glow: rgba(42,108,246,.3);
    }

    /* Doctor portal override */
    body.doctor-portal {
      --accent:    #059669;
      --accent-lt: #00c9b1;
      --accent-bg: #f0fdf4;
      --accent-glow: rgba(5,150,105,.3);
      --navy:      #064e3b;
      --navy-mid:  #065f46;
    }

    body { font-family: 'DM Sans', sans-serif; }

    /* Topbar gradient adapts to portal */
    .dhas-navbar {
      background: linear-gradient(145deg, var(--navy-mid), var(--navy));
      border-bottom: none;
    }

    h2.page-title,
    .dhas-card h5 { font-family: 'Fraunces', serif; }

    /* Hero card header */
    .lang-hero {
      border-radius: 20px;
      background: linear-gradient(135deg, var(--navy) 0%, var(--accent) 60%, var(--teal) 100%);
      padding: 28px 20px 24px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .lang-hero::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 130px; height: 130px;
      background: rgba(255,255,255,.08); border-radius: 50%;
    }
    .lang-hero::after {
      content: '';
      position: absolute; bottom: -20px; left: 40px;
      width: 90px; height: 90px;
      background: rgba(255,255,255,.05); border-radius: 50%;
    }
    .lang-hero-icon {
      width: 60px; height: 60px; border-radius: 18px;
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .lang-hero-icon svg {
      width: 30px; height: 30px; stroke: #fff; fill: none; stroke-width: 1.8;
    }
    .lang-hero-title {
      font-family: 'Fraunces', serif;
      font-size: 1.75rem; font-weight: 700; color: #fff;
      margin-bottom: 6px; position: relative;
    }
    .lang-hero-sub {
      color: rgba(255,255,255,.72); font-size: .85rem; position: relative;
    }

    /* Language buttons */
    .lang-btn {
      width: 100%;
      padding: 18px 20px;
      margin-bottom: 12px;
      border: 1.5px solid var(--border, #e4e9f4);
      border-radius: 14px;
      background: var(--card-bg, #fff);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--text, #0d1b3e);
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .lang-btn:hover {
      border-color: var(--accent);
      background: var(--accent-bg);
      color: var(--accent);
      transform: translateX(4px);
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    .lang-btn.active {
      border-color: var(--accent);
      background: var(--accent-bg);
      color: var(--accent);
    }
    html.dark .lang-btn,
    body.dark .lang-btn {
      background: var(--card-bg, #111c3c);
      border-color: var(--border, #1e2e58);
      color: var(--text, #e8efff);
    }
    html.dark .lang-btn.active,
    body.dark .lang-btn.active {
      border-color: var(--accent);
      background: rgba(42,108,246,.15);
      color: var(--accent);
    }
    body.doctor-portal html.dark .lang-btn.active,
    body.doctor-portal body.dark .lang-btn.active {
      background: rgba(5,150,105,.15);
    }
    .lang-btn:hover .lang-check,
    .lang-btn.active .lang-check {
      opacity: 1; transform: scale(1);
    }

    /* Check mark on right */
    .lang-check {
      margin-left: auto;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      opacity: 0; transform: scale(.6);
      transition: all .2s;
    }
    .lang-check svg {
      width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2.5;
    }

    .lang-flag { font-size: 1.8rem; flex-shrink: 0; }
    .lang-text-wrap { text-align: left; }
    .lang-name   { font-weight: 700; font-size: 1rem; }
    .lang-native { font-size: .78rem; opacity: .6; margin-top: 1px; }

    /* Alert */
    .dhas-alert.success {
      background: #d1fae5; color: #065f46;
      border-left: 4px solid #22d07a;
      border-radius: 10px; padding: 12px 16px;
      font-size: .88rem; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }
    body.doctor-portal .dhas-alert.success {
      background: #d1fae5; color: #065f46; border-left-color: #059669;
    }
    html.dark .dhas-alert.success,
    body.dark .dhas-alert.success {
      background: rgba(34,208,122,.12); color: #6ee7b7; border-left-color: #22d07a;
    }
    .dhas-alert.success svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

    /* Back button in navbar */
    .nav-back {
      color: rgba(255,255,255,.85); font-size: .85rem;
      text-decoration: none; background: rgba(255,255,255,.15);
      padding: 6px 16px; border-radius: 20px; transition: background .2s;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    .nav-back:hover { background: rgba(255,255,255,.25); }

    .page-wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 40px; }
  </style>
</head>
<body>

  <nav class="dhas-navbar">
    <div class="brand" id="navBrand">🏥 DHAS</div>
    <a id="navBack" href="dashboard.html" class="nav-back">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Dashboard
    </a>
  </nav>

  <div class="page-wrap">

    <div class="lang-hero">
      <div class="lang-hero-icon">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/></svg>
      </div>
      <div class="lang-hero-title">Select Language</div>
      <div class="lang-hero-sub">Choose your preferred display language</div>
    </div>

    <div class="dhas-card">

      <button class="lang-btn" id="btn-English" onclick="setLanguage('English')">
        <span class="lang-flag">🇬🇧</span>
        <span class="lang-text-wrap">
          <div class="lang-name">English</div>
          <div class="lang-native">English</div>
        </span>
        <span class="lang-check">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </span>
      </button>

      <button class="lang-btn" id="btn-Hindi" onclick="setLanguage('Hindi')">
        <span class="lang-flag">🇮🇳</span>
        <span class="lang-text-wrap">
          <div class="lang-name">Hindi</div>
          <div class="lang-native">हिंदी</div>
        </span>
        <span class="lang-check">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </span>
      </button>

      <button class="lang-btn" id="btn-Telugu" onclick="setLanguage('Telugu')">
        <span class="lang-flag">🇮🇳</span>
        <span class="lang-text-wrap">
          <div class="lang-name">Telugu</div>
          <div class="lang-native">తెలుగు</div>
        </span>
        <span class="lang-check">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </span>
      </button>

    </div>

    <div id="selectedLangMsg" class="dhas-alert success" style="display:none;">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span id="selectedLangText"></span>
    </div>

    <p class="text-muted text-center mt-12" style="font-size:.82rem;">
      Language preference is saved. Full translation coming in a future update.
    </p>

  </div>

  <script>
    // ── Detect portal ──────────────────────────────────────────
    (function() {
      var docToken = localStorage.getItem('dhas_doctor_token');
      var patToken = localStorage.getItem('dhas_token');
      var ref      = document.referrer || '';
      var isDoc    = (docToken && !patToken) || ref.indexOf('doctor') !== -1;

      if (isDoc) {
        document.body.classList.add('doctor-portal');
        document.getElementById('navBack').href = 'doctor_dashboard.html';
      }
    })();
  </script>
  <script src="js/language.js"></script>
</body>
</html>
