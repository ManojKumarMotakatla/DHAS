<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | DHAS</title>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0b1437; --navy-mid: #112057;
      --blue: #2a6cf6; --blue-lt: #4f8ef9;
      --teal: #00c9b1; --rose: #f25c7d;
      --bg: #f4f6fc; --surface: #ffffff;
      --border: #e4e9f4; --text: #0d1b3e;
      --muted: #6b7fa3;
    }
    html.dark body, body.dark {
      --bg: #080f28; --surface: #111c3c;
      --border: #1e2e58; --text: #e8efff; --muted: #7d93c3;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; text-align: center;
      transition: background .35s, color .35s;
      overflow: hidden;
    }

    /* Animated blobs */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: .12; pointer-events: none;
      animation: drift 10s ease-in-out infinite alternate;
    }
    html.dark .blob { opacity: .06; }
    .blob-1 { width: 400px; height: 400px; background: var(--blue);   top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: var(--teal);   bottom: -80px; right: -80px; animation-delay: -5s; }
    .blob-3 { width: 200px; height: 200px; background: var(--rose);   top: 40%; right: 15%; animation-delay: -3s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,15px) scale(1.06); } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px 40px;
      max-width: 440px; width: 100%;
      box-shadow: 0 8px 40px rgba(42,108,246,.12);
      position: relative; z-index: 1;
      animation: popIn .5s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes popIn { from { opacity: 0; transform: translateY(24px) scale(.97); } to { opacity: 1; transform: none; } }

    .error-code {
      font-family: 'Fraunces', serif;
      font-size: 6rem; font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
      animation: popIn .5s .08s cubic-bezier(.4,0,.2,1) both;
    }

    .pulse-icon {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      animation: popIn .5s .04s cubic-bezier(.4,0,.2,1) both;
    }
    html.dark .pulse-icon { background: rgba(42,108,246,.15); }
    .pulse-icon svg { width: 36px; height: 36px; stroke: var(--blue); fill: none; stroke-width: 1.6; }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--text); margin-bottom: 10px;
      animation: popIn .5s .12s cubic-bezier(.4,0,.2,1) both;
    }
    p {
      font-size: .9rem; color: var(--muted); line-height: 1.65;
      margin-bottom: 28px;
      animation: popIn .5s .16s cubic-bezier(.4,0,.2,1) both;
    }

    .actions {
      display: flex; flex-direction: column; gap: 10px;
      animation: popIn .5s .2s cubic-bezier(.4,0,.2,1) both;
    }
    .btn-primary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 24px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: .95rem; cursor: pointer;
      box-shadow: 0 4px 18px rgba(42,108,246,.3);
      text-decoration: none; transition: all .2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(42,108,246,.4); }
    .btn-primary svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2.2; }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: .9rem; cursor: pointer;
      text-decoration: none; transition: all .2s;
    }
    .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }
    .btn-secondary svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }

    .quick-links {
      margin-top: 28px; padding-top: 20px;
      border-top: 1px solid var(--border);
      animation: popIn .5s .24s cubic-bezier(.4,0,.2,1) both;
    }
    .ql-label { font-size: .72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
    .ql-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .ql-item {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 10px 6px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg);
      text-decoration: none; color: var(--muted);
      font-size: .72rem; font-weight: 600;
      transition: all .18s;
    }
    .ql-item:hover { border-color: var(--blue); color: var(--blue); background: #eff6ff; }
    html.dark .ql-item:hover { background: rgba(42,108,246,.1); }
    .ql-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card">
  <div class="pulse-icon">
    <svg viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
    </svg>
  </div>

  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The health record you're looking for seems to have gone missing. It may have been moved, deleted, or never existed. Let's get you back on track.</p>

  <div class="actions">
    <a href="dashboard.html" class="btn-primary">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Go to Dashboard
    </a>
    <a href="javascript:history.back()" class="btn-secondary">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Go Back
    </a>
  </div>

  <div class="quick-links">
    <div class="ql-label">Quick Links</div>
    <div class="ql-grid">
      <a href="symptom.html" class="ql-item">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Symptoms
      </a>
      <a href="reminder.html" class="ql-item">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Reminders
      </a>
      <a href="reports.html" class="ql-item">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        Reports
      </a>
      <a href="diet.html" class="ql-item">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Diet
      </a>
      <a href="remedies.html" class="ql-item">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
        Remedies
      </a>
      <a href="profile.html" class="ql-item">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Profile
      </a>
    </div>
  </div>
</div>

</body>
</html>
