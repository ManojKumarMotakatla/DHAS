<!-- 
  CHANGED SECTION ONLY — replace the confirmDelete() function
  in your existing frontend/profile.html <script> block.

  The new version pops a prompt asking for the user's password
  before sending the DELETE request.
  Google-only accounts skip the password check (handled server-side).
-->

<script>
/*
 * Paste this entire block into profile.html, replacing the existing
 * confirmDelete() function.
 */
async function confirmDelete() {
    // First confirmation
    if (!confirm("Permanently delete your account and all health data?")) return;

    const user    = JSON.parse(localStorage.getItem("dhas_user") || "{}");
    const profile = await fetch(
        window.API_BASE + "/profile/" + user.id,
        { headers: window.getAuthHeaders() }
    ).then(r => r.json()).catch(() => ({}));

    const isGoogleOnly = (profile.profile && profile.profile.provider === "google" && !profile.profile.password);

    let password = null;
    if (!isGoogleOnly) {
        // CHANGED: ask for password before deleting
        password = prompt(
            "Enter your account password to confirm permanent deletion.\n\n" +
            "This action cannot be undone."
        );
        if (password === null) return; // user cancelled
        if (!password.trim()) {
            alert("Password is required to delete your account.");
            return;
        }
        // Hash the password the same way login does (SHA-256)
        const buf      = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(password));
        password       = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    } else {
        if (!confirm("Final confirmation — this cannot be undone.")) return;
    }

    try {
        const res = await fetch(
            window.API_BASE + "/profile/" + user.id,
            {
                method:  "DELETE",
                headers: window.getAuthHeaders(),
                body:    JSON.stringify({ password })  // null for Google accounts
            }
        );
        const d = await res.json();

        if (d.success) {
            localStorage.removeItem("dhas_user");
            localStorage.removeItem("dhas_token");
            window.location.href = "login.html";
        } else {
            alert("Failed: " + d.message);
        }
    } catch {
        alert("Cannot connect to server.");
    }
}
</script>
