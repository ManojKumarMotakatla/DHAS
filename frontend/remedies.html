<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Remedies - DHAS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="dhas-navbar">
    <div class="brand">🏥 DHAS</div>
    <a href="dashboard.html" style="color:#fff;font-size:0.85rem;text-decoration:none;opacity:0.85;">← Dashboard</a>
  </nav>

  <div class="page-wrap">

    <h2 class="page-title">
      <span class="emoji">🌿</span>
      Home Remedies
    </h2>

    <div id="conditionNote" class="dhas-alert info" style="display:none;"></div>

    <div class="dhas-card" id="remediesCard">
      <h5>💚 Recommended Remedies</h5>
      <ul id="remediesList"></ul>
    </div>

    <div class="dhas-card">
      <h5>⚠️ When to See a Doctor</h5>
      <ul>
        <li>Symptoms last more than 3–5 days</li>
        <li>High fever above 103°F (39.4°C)</li>
        <li>Difficulty breathing or chest pain</li>
        <li>Symptoms keep getting worse</li>
        <li>You are pregnant, elderly, or have chronic illness</li>
      </ul>
    </div>

    <button class="btn-dhas secondary" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>

  </div>

  <script>
    const remediesData = {
      flu: [
        "Drink warm ginger tea with honey twice a day",
        "Steam inhalation with eucalyptus oil or Vicks for 10 min",
        "Rest and sleep for at least 8 hours",
        "Gargle with warm salt water for sore throat",
        "Use a humidifier in your room",
        "Take Vitamin C (orange juice, amla)"
      ],
      viral_fever: [
        "Apply a cool, damp cloth on forehead to reduce fever",
        "Drink tulsi (basil) + black pepper + ginger decoction",
        "Take complete bed rest",
        "Drink at least 2–3 liters of water daily",
        "Sponge bath with lukewarm water if fever is high",
        "Eat light, easy-to-digest food"
      ],
      common_cold: [
        "Steam inhalation 2–3 times a day",
        "Drink turmeric milk (haldi doodh) at night",
        "Ginger + honey + lemon in warm water",
        "Keep your nose and head warm",
        "Blow your nose gently to clear congestion",
        "Use saline nasal drops for relief"
      ],
      headache: [
        "Massage temples with peppermint or lavender oil",
        "Drink a large glass of water (dehydration causes headaches)",
        "Apply cold or hot compress on forehead/neck",
        "Rest in a dark, quiet room",
        "Practice deep breathing or meditation",
        "Avoid screen time for 30–60 minutes"
      ],
      covid_like: [
        "Isolate yourself and wear a mask",
        "Drink Kadha (boil tulsi, ginger, black pepper, cloves)",
        "Steam inhalation twice daily",
        "Monitor oxygen levels with a pulse oximeter",
        "Take complete rest and stay hydrated",
        "Consult a doctor if breathlessness develops"
      ],
      gastro: [
        "Drink ORS (oral rehydration solution) to prevent dehydration",
        "Sip small amounts of water or coconut water frequently",
        "Eat bananas, rice, toast (BRAT diet)",
        "Avoid solid food for a few hours if vomiting",
        "Take probiotic curd once symptoms ease",
        "Rest and avoid physical activity"
      ],
      general: [
        "Drink warm water regularly (8–10 glasses/day)",
        "Take proper rest (7–8 hours sleep)",
        "Do steam inhalation for cold/cough",
        "Use turmeric milk at night",
        "Maintain hydration throughout the day",
        "Eat light and easy to digest meals",
        "Avoid stress and practice deep breathing"
      ]
    };

    window.onload = function () {
      const condition = localStorage.getItem("dhas_condition") || "general";
      const remedies = remediesData[condition] || remediesData["general"];

      if (condition !== "general") {
        const note = document.getElementById("conditionNote");
        note.style.display = "block";
        note.textContent = "💡 Remedies tailored for: " + condition.replace(/_/g, " ").toUpperCase();
      }

      const list = document.getElementById("remediesList");
      remedies.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
      });
    };
  </script>

</body>
</html>
