<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Profile — DHAS</title>
  <script src="js/config.js"></script>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --navy: #0b1437; --navy-mid: #112057;
      --blue: #2a6cf6; --blue-lt: #4f8ef9; --teal: #00c9b1;
      --green: #22d07a; --amber: #f4a035; --rose: #f25c7d;
      --bg: #f4f6fc; --surface: #fff;
      --border: #e4e9f4; --text: #0d1b3e; --muted: #6b7fa3;
      --radius: 18px; --shadow: 0 2px 20px rgba(42,108,246,.09);
    }
    html.dark body, body.dark {
      --bg: #080f28; --surface: #111c3c; --border: #1e2e58;
      --text: #e8efff; --muted: #7d93c3;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; transition: background .35s, color .35s;
    }

    /* TOP */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 62px; display: flex; align-items: center;
      padding: 0 20px; gap: 14px;
      background: rgba(255,255,255,.9); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    body.dark .topbar { background: rgba(8,15,40,.92); }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 600; color: var(--muted);
      padding: 7px 12px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--bg);
      text-decoration: none; transition: all .18s;
    }
    .back-btn:hover { color: var(--blue); border-color: var(--blue); }
    .topbar-title {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: 1rem; color: var(--text); flex: 1; text-align: center;
    }
    .topbar-spacer { width: 90px; }

    .page { max-width: 600px; margin: 0 auto; padding: 0 0 60px; }

    /* COVER */
    .cover-section {
      background: linear-gradient(135deg, #0b1437 0%, #112057 45%, #1a3a8f 100%);
      position: relative; overflow: hidden; padding: 36px 24px 70px;
    }
    .cover-section::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 280px; height: 280px; border-radius: 50%;
      background: radial-gradient(circle, rgba(42,108,246,.3), transparent 70%);
    }
    .cover-section::after {
      content: ''; position: absolute; bottom: -80px; left: 10%;
      width: 260px; height: 260px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,201,177,.18), transparent 70%);
    }
    .cover-inner { position: relative; z-index: 1; display: flex; align-items: flex-start; gap: 20px; }
    .doc-avatar {
      width: 90px; height: 90px; border-radius: 24px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      border: 3px solid rgba(255,255,255,.25);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700;
      color: #fff; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .doc-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .cover-text { flex: 1; }
    .doc-verified {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(34,208,122,.2); border: 1px solid rgba(34,208,122,.35);
      color: #6ee7b7; font-size: .68rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .doc-verified i { font-size: 11px; }
    .doc-name {
      font-family: 'Playfair Display', serif; font-size: 1.8rem;
      font-weight: 900; color: #fff; margin-bottom: 4px; line-height: 1.1;
    }
    .doc-spec-big {
      font-size: .9rem; color: rgba(255,255,255,.65); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .doc-spec-big i { font-size: 14px; color: var(--teal); }
    .cover-stats { display: flex; gap: 20px; flex-wrap: wrap; }
    .cstat { text-align: center; }
    .cstat-val { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; color: #fff; }
    .cstat-lbl { font-size: .65rem; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    /* FLOATING CONNECT CARD */
    .connect-float {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 20px; padding: 20px 22px;
      margin: -36px 20px 20px; position: relative; z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,.12);
    }
    .connect-title {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: 1rem; color: var(--text); margin-bottom: 4px;
    }
    .connect-sub { font-size: .78rem; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .invite-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .invite-big-code {
      background: rgba(42,108,246,.08); border: 2px solid rgba(42,108,246,.2);
      border-radius: 12px; padding: 10px 18px; font-size: 1.2rem;
      font-weight: 800; color: var(--blue); letter-spacing: 2.5px;
      font-family: 'DM Sans', sans-serif; flex: 1; text-align: center;
    }
    body.dark .invite-big-code { background: rgba(42,108,246,.15); border-color: rgba(42,108,246,.3); color: #7aafff; }
    .btn-copy-big {
      display: flex; align-items: center; gap: 7px;
      padding: 11px 20px; border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #fff; font-weight: 700; font-size: .88rem;
      border: none; cursor: pointer; font-family: 'DM Sans', sans-serif;
      box-shadow: 0 4px 16px rgba(42,108,246,.3); transition: all .2s;
      white-space: nowrap;
    }
    .btn-copy-big:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(42,108,246,.4); }
    .btn-copy-big.copied { background: linear-gradient(135deg, #059669, #10b981); box-shadow: 0 4px 16px rgba(5,150,105,.3); }
    .btn-copy-big i { font-size: 15px; }
    .connect-hint { font-size: .72rem; color: var(--muted); margin-top: 10px; line-height: 1.5; }
    .connect-hint strong { color: var(--blue); }

    /* SECTIONS */
    .body-wrap { padding: 0 20px; }

    .section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .sec-head {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      font-size: .7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-head i { font-size: 14px; }
    .sec-body { padding: 16px 18px; }

    /* BIO */
    .bio-text { font-size: .9rem; color: var(--text); line-height: 1.75; }
    .bio-text.collapsed { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .read-more { color: var(--blue); font-size: .8rem; font-weight: 600; cursor: pointer; margin-top: 6px; display: inline-block; }

    /* EXPERTISE TAGS */
    .tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .expert-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(42,108,246,.07); border: 1px solid rgba(42,108,246,.15);
      color: var(--blue); border-radius: 20px; padding: 5px 12px;
      font-size: .78rem; font-weight: 600;
    }
    body.dark .expert-tag { background: rgba(42,108,246,.15); border-color: rgba(42,108,246,.25); color: #7aafff; }
    .expert-tag i { font-size: 12px; }

    /* TIMELINE (education / experience) */
    .timeline { position: relative; }
    .timeline::before {
      content: ''; position: absolute; left: 19px; top: 8px; bottom: 8px;
      width: 2px; background: linear-gradient(180deg, var(--blue), var(--teal));
      opacity: .2; border-radius: 2px;
    }
    .timeline-item { display: flex; gap: 16px; margin-bottom: 18px; }
    .timeline-item:last-child { margin-bottom: 0; }
    .tl-dot {
      width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      position: relative; z-index: 1; border: 2px solid var(--surface);
      box-shadow: 0 0 0 2px var(--border);
    }
    .tl-dot i { font-size: 17px; }
    .tl-dot.edu { background: rgba(42,108,246,.1); color: var(--blue); }
    .tl-dot.work { background: rgba(0,201,177,.1); color: var(--teal); }
    .tl-dot.award { background: rgba(244,160,53,.1); color: var(--amber); }
    .tl-content { flex: 1; padding-top: 8px; }
    .tl-title { font-weight: 700; font-size: .92rem; color: var(--text); margin-bottom: 2px; }
    .tl-place { font-size: .8rem; color: var(--blue); font-weight: 600; margin-bottom: 2px; }
    .tl-year { font-size: .74rem; color: var(--muted); }
    .tl-desc { font-size: .78rem; color: var(--muted); margin-top: 4px; line-height: 1.5; }

    /* CONTACT / LANG */
    .info-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-icon { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .info-icon i { font-size: 17px; }
    .info-lbl { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
    .info-val { font-size: .88rem; font-weight: 600; color: var(--text); }

    /* LOADING */
    .skeleton-wrap { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .skel { background: linear-gradient(90deg, var(--border) 25%, rgba(255,255,255,.06) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* TOAST */
    #dhasToast {
      position: fixed; bottom: 24px; left: 20px; z-index: 99999;
      max-width: 320px; padding: 12px 16px; border-radius: 12px;
      font-size: .85rem; font-weight: 600; display: none;
      align-items: center; gap: 8px; box-shadow: 0 6px 24px rgba(0,0,0,.18);
    }
    #dhasToast.success { background: #d1fae5; border: 1.5px solid #6ee7b7; color: #065f46; }
    body.dark #dhasToast.success { background: #052e16; border-color: #166534; color: #86efac; }
  </style>
</head>
<body>

<div id="dhasToast" role="status" aria-live="polite"></div>

<header class="topbar">
  <a href="find_doctor.html" class="back-btn">
    <i class="ti ti-chevron-left" style="font-size:15px" aria-hidden="true"></i>
    Find a Doctor
  </a>
  <div class="topbar-title">Doctor Profile</div>
  <div class="topbar-spacer"></div>
</header>

<div class="page" id="mainPage">
  <div class="skeleton-wrap">
    <div class="skel" style="height:220px;border-radius:0;"></div>
    <div class="skel" style="height:140px;margin:0 16px;border-radius:16px;"></div>
    <div class="skel" style="height:100px;margin:0 16px;border-radius:16px;"></div>
  </div>
</div>

<script>
const BASE = window.API_BASE;

let _tt = null;
function showToast(text) {
  const t = document.getElementById('dhasToast');
  t.className = 'success';
  t.innerHTML = `<i class="ti ti-circle-check" style="font-size:15px"></i><span>${text}</span>`;
  t.style.display = 'flex';
  if (_tt) clearTimeout(_tt);
  _tt = setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function copyCode(code, btn) {
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Copied!';
    showToast(`Invite code ${code} copied!`);
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> Copy Invite Code';
    }, 2500);
  });
}

function buildTimeline(items, type) {
  if (!items || !items.length) return '<p style="font-size:.84rem;color:var(--muted);padding:4px 0;">Not provided yet.</p>';
  return items.map(item => `
    <div class="timeline-item">
      <div class="tl-dot ${type}">
        <i class="ti ti-${type === 'edu' ? 'school' : type === 'work' ? 'briefcase' : 'award'}" aria-hidden="true"></i>
      </div>
      <div class="tl-content">
        <div class="tl-title">${item.title || ''}</div>
        ${item.place ? `<div class="tl-place">${item.place}</div>` : ''}
        ${item.year  ? `<div class="tl-year">${item.year}</div>` : ''}
        ${item.desc  ? `<div class="tl-desc">${item.desc}</div>` : ''}
      </div>
    </div>`).join('');
}

function renderPage(d) {
  const page     = document.getElementById('mainPage');
  const initials = (d.name || 'D').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  const avatar   = d.profile_photo
    ? `<img src="${d.profile_photo}" alt="Dr. ${d.name}">`
    : initials;

  const education  = parseJSON(d.education,  []);
  const experience = parseJSON(d.experience, []);
  const expertise  = parseJSON(d.expertise,  []);
  const languages  = d.languages ? d.languages.split(',').map(s => s.trim()) : [];

  page.innerHTML = `
    <!-- COVER -->
    <div class="cover-section">
      <div class="cover-inner">
        <div class="doc-avatar">${avatar}</div>
        <div class="cover-text">
          <div class="doc-verified"><i class="ti ti-circle-check" aria-hidden="true"></i>Verified DHAS Doctor</div>
          <div class="doc-name">Dr. ${d.name}</div>
          <div class="doc-spec-big"><i class="ti ti-stethoscope" aria-hidden="true"></i>${d.speciality || 'General Physician'}</div>
          <div class="cover-stats">
            ${d.experience_years ? `<div class="cstat"><div class="cstat-val">${d.experience_years}+</div><div class="cstat-lbl">Yrs Exp</div></div>` : ''}
            <div class="cstat"><div class="cstat-val">${d.patient_count || 0}</div><div class="cstat-lbl">Patients</div></div>
            ${education.length ? `<div class="cstat"><div class="cstat-val">${education.length}</div><div class="cstat-lbl">Degrees</div></div>` : ''}
          </div>
        </div>
      </div>
    </div>

    <!-- CONNECT FLOAT -->
    <div class="body-wrap">
      <div class="connect-float">
        <div class="connect-title">Connect with Dr. ${d.name.split(' ')[0]}</div>
        <div class="connect-sub">Go to your Profile → "Connect to Doctor" and enter this code to share your health data securely.</div>
        <div class="invite-row">
          <div class="invite-big-code">${d.invite_code}</div>
          <button class="btn-copy-big" onclick="copyCode('${d.invite_code}', this)">
            <i class="ti ti-copy" aria-hidden="true"></i> Copy Invite Code
          </button>
        </div>
        <div class="connect-hint">
          After connecting, Dr. ${d.name.split(' ')[0]} can securely view your <strong>symptom history</strong> and <strong>medical reports</strong> to provide better care.
        </div>
      </div>

      <!-- ABOUT -->
      ${d.bio || d.about ? `
      <div class="section">
        <div class="sec-head"><i class="ti ti-user" aria-hidden="true"></i>About</div>
        <div class="sec-body">
          <div class="bio-text collapsed" id="bioText">${d.bio || d.about}</div>
          <span class="read-more" id="readMoreBtn" onclick="expandBio()">Read more ↓</span>
        </div>
      </div>` : ''}

      <!-- EXPERTISE -->
      ${expertise.length ? `
      <div class="section">
        <div class="sec-head"><i class="ti ti-certificate" aria-hidden="true"></i>Areas of Expertise</div>
        <div class="sec-body">
          <div class="tags-wrap">
            ${expertise.map(e => `<span class="expert-tag"><i class="ti ti-check" aria-hidden="true"></i>${e}</span>`).join('')}
          </div>
        </div>
      </div>` : ''}

      <!-- EDUCATION -->
      ${education.length ? `
      <div class="section">
        <div class="sec-head"><i class="ti ti-school" aria-hidden="true"></i>Education & Qualifications</div>
        <div class="sec-body">
          <div class="timeline">${buildTimeline(education, 'edu')}</div>
        </div>
      </div>` : ''}

      <!-- EXPERIENCE -->
      ${experience.length ? `
      <div class="section">
        <div class="sec-head"><i class="ti ti-briefcase" aria-hidden="true"></i>Work Experience</div>
        <div class="sec-body">
          <div class="timeline">${buildTimeline(experience, 'work')}</div>
        </div>
      </div>` : ''}

      <!-- INFO -->
      <div class="section">
        <div class="sec-head"><i class="ti ti-info-circle" aria-hidden="true"></i>Details</div>
        <div class="sec-body">
          ${d.hospital ? `<div class="info-row">
            <div class="info-icon" style="background:rgba(42,108,246,.08);color:var(--blue);"><i class="ti ti-building-hospital" aria-hidden="true"></i></div>
            <div><div class="info-lbl">Hospital / Clinic</div><div class="info-val">${d.hospital}</div></div>
          </div>` : ''}
          ${d.city ? `<div class="info-row">
            <div class="info-icon" style="background:rgba(0,201,177,.08);color:var(--teal);"><i class="ti ti-map-pin" aria-hidden="true"></i></div>
            <div><div class="info-lbl">Location</div><div class="info-val">${d.city}${d.state ? ', ' + d.state : ''}</div></div>
          </div>` : ''}
          ${d.consultation_fee ? `<div class="info-row">
            <div class="info-icon" style="background:rgba(34,208,122,.08);color:var(--green);"><i class="ti ti-currency-rupee" aria-hidden="true"></i></div>
            <div><div class="info-lbl">Consultation Fee</div><div class="info-val">₹${d.consultation_fee}</div></div>
          </div>` : ''}
          ${languages.length ? `<div class="info-row">
            <div class="info-icon" style="background:rgba(139,92,246,.08);color:#8b5cf6;"><i class="ti ti-message-circle" aria-hidden="true"></i></div>
            <div><div class="info-lbl">Languages</div><div class="info-val">${languages.join(', ')}</div></div>
          </div>` : ''}
          <div class="info-row">
            <div class="info-icon" style="background:rgba(42,108,246,.08);color:var(--blue);"><i class="ti ti-calendar-event" aria-hidden="true"></i></div>
            <div><div class="info-lbl">Member Since</div><div class="info-val">${new Date(d.created_at).toLocaleDateString('en-IN', {month:'long', year:'numeric'})}</div></div>
          </div>
        </div>
      </div>

    </div>`;

  // Bio read-more toggle
  const bioEl = document.getElementById('bioText');
  const rmBtn = document.getElementById('readMoreBtn');
  if (bioEl && rmBtn) {
    if (bioEl.scrollHeight <= bioEl.clientHeight + 5) rmBtn.style.display = 'none';
  }
}

function expandBio() {
  const bio = document.getElementById('bioText');
  const btn = document.getElementById('readMoreBtn');
  if (bio.classList.contains('collapsed')) {
    bio.classList.remove('collapsed');
    btn.textContent = 'Show less ↑';
  } else {
    bio.classList.add('collapsed');
    btn.textContent = 'Read more ↓';
  }
}

function parseJSON(val, fallback) {
  if (!val) return fallback;
  if (Array.isArray(val)) return val;
  try { return JSON.parse(val); } catch { return fallback; }
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const id     = params.get('id');
  if (!id) { window.location.href = 'find_doctor.html'; return; }

  try {
    const res  = await fetch(`${BASE}/doctor/public/${id}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    renderPage(data.doctor);
  } catch (e) {
    document.getElementById('mainPage').innerHTML = `
      <div style="text-align:center;padding:60px 20px;color:var(--muted);">
        <i class="ti ti-alert-circle" style="font-size:48px;display:block;margin:0 auto 14px;opacity:.4;"></i>
        <div style="font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px;">Doctor not found</div>
        <div style="font-size:.84rem;margin-bottom:20px;">Could not load this doctor's profile.</div>
        <a href="find_doctor.html" style="color:var(--blue);font-weight:600;font-size:.88rem;">← Back to Doctor Directory</a>
      </div>`;
  }
}

load();
</script>
</body>
</html>
