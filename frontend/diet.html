<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet - Digital Health Assistant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-4">

        <h3 class="text-center mb-4">Diet Recommendation</h3>

        <div class="card p-3 shadow-sm mb-3">
            <h5>Foods to Eat</h5>
            <ul>
                <li>Fruits (Orange, Apple)</li>
                <li>Vegetable Soup</li>
                <li>Warm Water</li>
                <li>Light Home Food</li>
            </ul>
        </div>

        <div class="card p-3 shadow-sm">
            <h5>Foods to Avoid</h5>
            <ul>
                <li>Junk Food</li>
                <li>Oily Food</li>
                <li>Cold Drinks</li>
                <li>Spicy Food</li>
            </ul>
        </div>

        <button class="btn btn-primary w-100 mt-3" onclick="goBack()">Back</button>

    </div>

    <script>
        function goBack() {
            window.location.href = "dashboard.html";
        }
    </script>
