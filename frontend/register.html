<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="theme.js"></script>
  <title>Register - DHAS</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0b1437;--navy-mid:#112057;--blue:#2a6cf6;--teal:#00c9b1;
      --bg:#f4f6fc;--surface:#fff;--border:#e4e9f4;--text:#0d1b3e;--muted:#6b7fa3;
      --radius:18px;--shadow:0 2px 20px rgba(42,108,246,.09);
    }

    /* ─── DARK MODE ─── */
    html.dark,html.dark body,body.dark{
      --navy:#040b1c;--navy-mid:#091230;
      --bg:#080f28;--surface:#111c3c;--border:#1e2e58;
      --text:#e8efff;--muted:#7d93c3;
      background:#080f28 !important;color:#e8efff !important;
    }
    html.dark .auth-card,body.dark .auth-card{background:#111c3c;border-color:#1e2e58;}
    html.dark .dhas-input,body.dark .dhas-input{background:#080f28;color:#e8efff;border-color:#1e2e58;}
    html.dark .dhas-input:focus,body.dark .dhas-input:focus{background:#111c3c;border-color:#2a6cf6;box-shadow:0 0 0 3px rgba(42,108,246,0.2);}
    html.dark .dhas-input::placeholder,body.dark .dhas-input::placeholder{color:#7d93c3;}
    html.dark .dhas-label,body.dark .dhas-label{color:#7d93c3;}
    html.dark .strength-segment,body.dark .strength-segment{background:#1e2e58;}
    html.dark .req-list li,body.dark .req-list li{color:#7d93c3;}
    html.dark .req-list li.ok,body.dark .req-list li.ok{color:#6ee7b7;}
    html.dark .req-list li.ok::before{color:#6ee7b7;}
    html.dark .toggle-eye,body.dark .toggle-eye{color:#7d93c3;}
    html.dark .theme-pill,body.dark .theme-pill{background:#111c3c;border-color:#1e2e58;color:#7d93c3;}
    html.dark .or-divider,body.dark .or-divider{color:#7d93c3;}
    html.dark .or-divider::before,html.dark .or-divider::after,
    body.dark .or-divider::before,body.dark .or-divider::after{background:#1e2e58;}
    html.dark .google-btn-wrap,body.dark .google-btn-wrap{background:#fff;border-color:#dadce0;}
    html.dark .dhas-alert.danger,body.dark .dhas-alert.danger{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5;}
    html.dark .dhas-alert.success,body.dark .dhas-alert.success{background:rgba(34,208,122,.12);border-color:rgba(34,208,122,.3);color:#6ee7b7;}
    html.dark p,body.dark p{color:#7d93c3;}
    html.dark a,body.dark a{color:#7aafff;}

    /* ─── EMAIL STATUS HINT ─── */
    html.dark .email-status.warn,body.dark .email-status.warn{color:#fbbf24;}
    html.dark .email-status.warn strong{color:#fde68a;}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;transition:background .35s,color .35s;color:var(--text);}

    .theme-toggle-wrap{position:fixed;top:16px;right:16px;z-index:100;}
    .theme-pill{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 10px;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--muted);transition:all .2s,background .35s,border-color .35s;}
    .theme-pill:hover{color:var(--blue);border-color:var(--blue);}
    .theme-pill svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;}

    .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .auth-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 8px 40px rgba(42,108,246,.12);padding:36px 32px;width:100%;max-width:420px;transition:background .35s,border-color .35s;}
    .auth-logo{text-align:center;margin-bottom:24px;background:linear-gradient(145deg,var(--navy-mid),var(--navy));border-radius:14px;padding:20px;}
    .auth-logo .logo-icon{font-size:2rem;}
    .auth-logo h2{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:#fff;margin:6px 0 2px;}
    .auth-logo p{color:rgba(255,255,255,.5);font-size:.82rem;}
    .dhas-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;transition:color .35s;}
    .dhas-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s,background .35s,color .35s;margin-bottom:4px;}
    .dhas-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(42,108,246,.12);background:var(--surface);}
    .dhas-input::placeholder{color:var(--muted);}
    .btn-dhas{width:100%;padding:13px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;transition:all .2s;display:inline-block;text-align:center;}
    .btn-dhas.primary{background:linear-gradient(135deg,var(--blue),#4f8ef9);color:#fff;box-shadow:0 4px 16px rgba(42,108,246,.3);}
    .btn-dhas.primary:hover{transform:translateY(-1px);}
    .dhas-alert{padding:11px 14px;border-radius:10px;font-size:.84rem;font-weight:600;margin-bottom:12px;}
    .dhas-alert.danger{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;}
    .dhas-alert.success{background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;}
    .or-divider{display:flex;align-items:center;gap:12px;margin:18px 0 14px;color:var(--muted);font-size:.78rem;font-weight:600;}
    .or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .google-btn-wrap{display:flex;justify-content:center;background:#ffffff;border-radius:12px;padding:10px;border:1.5px solid #dadce0;transition:box-shadow .2s;}
    .google-btn-wrap:hover{box-shadow:0 2px 12px rgba(0,0,0,.12);}

    /* password strength */
    .strength-segment{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
    .pw-wrap{position:relative;}.pw-wrap .dhas-input{padding-right:2.8rem;}
    .toggle-eye{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;padding:0;cursor:pointer;color:var(--muted);display:flex;align-items:center;transition:color .2s;z-index:5;}
    .toggle-eye:hover{color:var(--blue);}
    .toggle-eye svg{width:20px;height:20px;pointer-events:none;}
    .req-list{list-style:none;padding:0;margin:8px 0 14px;font-size:.78rem;}
    .req-list li{display:flex;align-items:center;gap:6px;color:var(--muted);margin-bottom:3px;transition:color .25s;}
    .req-list li::before{content:"✗";font-weight:700;color:#e74c3c;min-width:14px;}
    .req-list li.ok{color:#27ae60;}.req-list li.ok::before{content:"✓";color:#27ae60;}

    /* email status */
    .email-status{font-size:.75rem;margin-top:3px;margin-bottom:10px;display:none;}
    .email-status.valid{color:#27ae60;display:block;}
    .email-status.invalid{color:#e74c3c;display:block;}
    .email-status.warn{color:#d97706;display:block;}

    .strength-bar-wrap{display:flex;gap:4px;margin-top:6px;}
    .strength-label{font-size:.75rem;margin-top:4px;font-weight:600;}
    p{color:var(--muted);}
    a{color:var(--blue);font-weight:700;text-decoration:none;}
  </style>
</head>
<body>

<div class="theme-toggle-wrap">
  <div class="theme-pill" onclick="toggleTheme()">
    <svg class="theme-icon" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
    <span class="theme-label">Dark</span>
  </div>
</div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">✨</div>
      <h2>Create Account</h2>
      <p>Join your personal health assistant</p>
    </div>

    <div id="errorMsg"   class="dhas-alert danger"  style="display:none;"></div>
    <div id="successMsg" class="dhas-alert success" style="display:none;"></div>

    <label class="dhas-label">Full Name</label>
    <input type="text" id="name" class="dhas-input" placeholder="Your full name">

    <label class="dhas-label">Email Address</label>
    <input type="email" id="email" class="dhas-input" placeholder="you@example.com"
           oninput="validateEmail(this.value)">
    <div class="email-status" id="emailStatus"></div>

    <label class="dhas-label">Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" class="dhas-input"
             placeholder="Min. 6 chars — uppercase, lowercase, number & symbol"
             oninput="evaluatePassword(this.value)">
      <button type="button" class="toggle-eye" onclick="togglePw('password','eyeReg')" aria-label="Show or hide password">
        <svg id="eyeReg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      </button>
    </div>

    <div class="strength-bar-wrap">
      <div class="strength-segment" id="seg1"></div>
      <div class="strength-segment" id="seg2"></div>
      <div class="strength-segment" id="seg3"></div>
      <div class="strength-segment" id="seg4"></div>
    </div>
    <div class="strength-label" id="strengthLabel" style="color:#aaa;">—</div>

    <ul class="req-list">
      <li id="req-len">At least 6 characters</li>
      <li id="req-upper">At least one uppercase letter (A–Z)</li>
      <li id="req-lower">At least one lowercase letter (a–z)</li>
      <li id="req-num">At least one number (0–9)</li>
      <li id="req-sym">At least one symbol (!@#$%^&amp;* …)</li>
    </ul>

    <button class="btn-dhas primary" onclick="submitRegister()">Create Account</button>

    <p style="text-align:center;margin-top:16px;font-size:.84rem;">
      Already have an account?
      <a href="login.html">Login</a>
    </p>

    <div class="or-divider">OR</div>

    <!-- Google button always on white background -->
    <div class="google-btn-wrap">
      <div id="g_id_onload"
           data-client_id="935050379586-3vj8chtqv922uqmqurgknmtdseh0vlpv.apps.googleusercontent.com"
           data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin"
           data-type="standard" data-size="large" data-theme="outline"
           data-text="signup_with" data-shape="pill" data-width="320">
      </div>
    </div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────────────────────
  // EMAIL VALIDATION
  // ─────────────────────────────────────────────────────────────

  // Known common-domain typos → correct spelling
  const DOMAIN_HINTS = {
    "gmial.com":"gmail.com",   "gmai.com":"gmail.com",
    "gmal.com":"gmail.com",    "gmil.com":"gmail.com",
    "gmaill.com":"gmail.com",  "gmail.co":"gmail.com",
    "gmail.cm":"gmail.com",    "gmail.con":"gmail.com",
    "gmail.cpm":"gmail.com",   "gamil.com":"gmail.com",
    "gnail.com":"gmail.com",   "gmail.om":"gmail.com",
    "yahooo.com":"yahoo.com",  "yaho.com":"yahoo.com",
    "yahoo.co":"yahoo.com",    "yahoo.cm":"yahoo.com",
    "ymail.com":"yahoo.com",   "yahooo.in":"yahoo.com",
    "hotmial.com":"hotmail.com","hotmail.co":"hotmail.com",
    "hotmail.cm":"hotmail.com","hotmall.com":"hotmail.com",
    "outlok.com":"outlook.com","outook.com":"outlook.com",
    "otulook.com":"outlook.com","outlook.co":"outlook.com",
    "outlookk.com":"outlook.com",
  };

  // Strict regex:
  //   - local part: at least 1 char, no spaces or @
  //   - @ exactly once
  //   - domain: proper labels (letters/digits/hyphens), no consecutive dots
  //   - TLD: 2–10 alpha characters only (rejects purely numeric TLDs)
  const EMAIL_RE = /^[^\s@]+@[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?)*\.[a-zA-Z]{2,10}$/;

  function isValidEmailFormat(email) {
    return EMAIL_RE.test(email);
  }

  function getDomainHint(email) {
    const parts = email.split("@");
    if (parts.length !== 2) return null;
    return DOMAIN_HINTS[parts[1].toLowerCase()] || null;
  }

  function validateEmail(email) {
    const s   = document.getElementById("emailStatus");
    const raw = email.trim();

    if (!raw.length) {
      s.textContent = "";
      s.className   = "email-status";
      return;
    }

    const hint = getDomainHint(raw);

    if (!isValidEmailFormat(raw)) {
      // Typo domain takes priority — gives a more helpful message
      if (hint) {
        const local = raw.split("@")[0];
        s.innerHTML   = `✗ Did you mean <strong>${local}@${hint}</strong>?`;
        s.className   = "email-status invalid";
      } else if (!raw.includes("@")) {
        s.textContent = "✗ Missing @ symbol";
        s.className   = "email-status invalid";
      } else if (raw.indexOf("@") === raw.lastIndexOf("@") && !raw.split("@")[1].includes(".")) {
        s.textContent = "✗ Missing domain extension (e.g. .com, .in)";
        s.className   = "email-status invalid";
      } else {
        s.textContent = "✗ Invalid email — check spelling and format (e.g. name@gmail.com)";
        s.className   = "email-status invalid";
      }
      return;
    }

    // Format is technically valid but domain is a known typo
    if (hint) {
      const local = raw.split("@")[0];
      s.innerHTML = `⚠ Did you mean <strong>${local}@${hint}</strong>?`;
      s.className = "email-status warn";
      return;
    }

    s.textContent = "✓ Email looks good";
    s.className   = "email-status valid";
  }

  // ─────────────────────────────────────────────────────────────
  // PASSWORD TOGGLE
  // ─────────────────────────────────────────────────────────────
  function togglePw(fieldId, iconId) {
    const field  = document.getElementById(fieldId);
    const icon   = document.getElementById(iconId);
    const hiding = field.type === "password";
    field.type   = hiding ? "text" : "password";
    icon.innerHTML = hiding
      ? `<path stroke-linecap="round" stroke-linejoin="round"
             d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7
                a9.97 9.97 0 012.637-4.217M6.53 6.53A9.969 9.969 0 0112 5
                c4.477 0 8.268 2.943 9.542 7a9.965 9.965 0 01-4.107 5.02
                M15 12a3 3 0 00-3-3m0 0a3 3 0 00-2.122.879M3 3l18 18"/>`
      : `<path stroke-linecap="round" stroke-linejoin="round"
             d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
         <path stroke-linecap="round" stroke-linejoin="round"
             d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7
                -1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
  }

  // ─────────────────────────────────────────────────────────────
  // PASSWORD STRENGTH
  // ─────────────────────────────────────────────────────────────
  const RULES = {
    len:   v => v.length >= 6,
    upper: v => /[A-Z]/.test(v),
    lower: v => /[a-z]/.test(v),
    num:   v => /[0-9]/.test(v),
    sym:   v => /[^A-Za-z0-9]/.test(v),
  };
  const COLORS = ["","#e74c3c","#e67e22","#f1c40f","#27ae60"];
  const LABELS = ["","Weak","Fair","Good","Strong"];

  function evaluatePassword(val) {
    Object.keys(RULES).forEach(k => {
      document.getElementById("req-"+k)?.classList.toggle("ok", RULES[k](val));
    });
    const score = Object.values(RULES).filter(fn => fn(val)).length;
    const bars  = val.length === 0 ? 0 : Math.max(1, Math.round(score * 4 / 5));
    const color = COLORS[bars] || "#e0e0e0";
    for (let i = 1; i <= 4; i++) {
      document.getElementById("seg"+i).style.background = i <= bars ? color : "";
    }
    const lbl = document.getElementById("strengthLabel");
    lbl.textContent = val.length === 0 ? "—" : (LABELS[bars] || "—");
    lbl.style.color = val.length === 0 ? "#aaa" : color;
  }

  function isPasswordValid(val) {
    return Object.values(RULES).every(fn => fn(val));
  }

  // ─────────────────────────────────────────────────────────────
  // SHA-256 HASH
  // ─────────────────────────────────────────────────────────────
  async function sha256(plain) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(plain));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  // ─────────────────────────────────────────────────────────────
  // FORM SUBMIT
  // ─────────────────────────────────────────────────────────────
  async function submitRegister() {
    const name     = document.getElementById("name").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errBox   = document.getElementById("errorMsg");
    const okBox    = document.getElementById("successMsg");

    const showErr = msg => {
      errBox.textContent = msg;
      errBox.style.display = "block";
      okBox.style.display  = "none";
    };

    errBox.style.display = "none";

    // ── Field presence checks ──
    if (!name)  { showErr("Full name is required."); return; }
    if (!email) { showErr("Email address is required."); return; }

    // ── Strict format check ──
    if (!isValidEmailFormat(email)) {
      const hint = getDomainHint(email);
      if (hint) {
        const local = email.split("@")[0];
        showErr(`Did you mean ${local}@${hint}? Please correct the email address.`);
      } else if (!email.includes("@")) {
        showErr("Email address must contain an @ symbol.");
      } else if (!email.split("@")[1]?.includes(".")) {
        showErr("Email must include a domain extension (e.g. .com or .in).");
      } else {
        showErr("Please enter a valid email address (e.g. name@gmail.com).");
      }
      return;
    }

    // ── Typo domain check — block even if format passes ──
    const hint = getDomainHint(email);
    if (hint) {
      const local = email.split("@")[0];
      showErr(`Did you mean ${local}@${hint}? Please correct the email address.`);
      return;
    }

    // ── Password strength check ──
    if (!isPasswordValid(password)) {
      showErr("Password must be at least 6 characters and include an uppercase letter, a lowercase letter, a number, and a symbol.");
      return;
    }

    const hashedPassword = await sha256(password);
    handleRegister(name, email, hashedPassword);
  }

  // ─────────────────────────────────────────────────────────────
  // GOOGLE AUTH CALLBACK
  // ─────────────────────────────────────────────────────────────
  function handleCredentialResponse(response) {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    handleGoogleAuth(payload.name, payload.email, payload.sub);
  }
</script>
<script src="js/auth.js"></script>
</body>
</html>
