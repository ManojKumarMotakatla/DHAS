<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Reminders — DHAS</title>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0b1437;
      --navy-mid:  #112057;
      --blue:      #2a6cf6;
      --blue-lt:   #4f8ef9;
      --teal:      #00c9b1;
      --amber:     #f4a035;
      --rose:      #f25c7d;
      --green:     #22d07a;
      --purple:    #8250ff;
      --bg:        #f4f6fc;
      --surface:   #ffffff;
      --border:    #e4e9f4;
      --text:      #0d1b3e;
      --muted:     #6b7fa3;
      --radius:    18px;
      --radius-sm: 10px;
      --shadow:    0 2px 20px rgba(42,108,246,.09);
      --shadow-md: 0 6px 32px rgba(42,108,246,.14);
    }
    body.dark {
      --bg:      #080f28;
      --surface: #111c3c;
      --border:  #1e2e58;
      --text:    #e8efff;
      --muted:   #7d93c3;
      --shadow:  0 2px 20px rgba(0,0,0,.4);
      --shadow-md: 0 6px 32px rgba(0,0,0,.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .35s, color .35s;
      padding-bottom: 60px;
    }
    a { text-decoration: none; color: inherit; }
    svg { display: block; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 60px; display: flex; align-items: center;
      padding: 0 20px; gap: 14px;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      transition: background .35s;
    }
    body.dark .topbar { background: rgba(8,15,40,.88); }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .82rem; font-weight: 600; color: var(--muted);
      padding: 7px 12px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--bg);
      transition: all .18s; cursor: pointer;
    }
    .back-btn:hover { color: var(--blue); border-color: var(--blue); }
    .back-btn svg { width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5; }
    .topbar-title {
      font-family: 'Fraunces', serif; font-weight: 600;
      font-size: 1rem; color: var(--text); flex: 1; text-align: center;
    }
    .add-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: .8rem; font-weight: 700; color: #fff;
      padding: 7px 14px; border-radius: 9px;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      border: none; cursor: pointer; transition: all .18s;
      box-shadow: 0 3px 12px rgba(42,108,246,.3);
    }
    .add-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(42,108,246,.4); }
    .add-btn svg { width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5; }

    /* ── PAGE BODY ── */
    .page { max-width: 560px; margin: 0 auto; padding: 20px 16px 40px; }

    /* ── HEADER CARD ── */
    .header-card {
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy) 60%, #0a1f5e 100%);
      border-radius: 20px; padding: 22px 20px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .header-card::before {
      content: ''; position: absolute; top: -30px; right: -30px;
      width: 140px; height: 140px; border-radius: 50%;
      background: radial-gradient(circle, rgba(42,108,246,.3), transparent 70%);
      pointer-events: none;
    }
    .hc-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .hc-icon {
      width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
      background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
    }
    .hc-icon svg { width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8; }
    .hc-title {
      font-family: 'Fraunces', serif; font-size: 1.35rem;
      font-weight: 700; color: #fff; margin-bottom: 2px;
    }
    .hc-sub { font-size: .78rem; color: rgba(255,255,255,.55); }
    .hc-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .hc-stat {
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px; padding: 10px; text-align: center;
    }
    .hc-stat-val {
      font-family: 'Fraunces', serif; font-size: 1.3rem;
      font-weight: 700; color: #fff; line-height: 1;
    }
    .hc-stat-lbl {
      font-size: .62rem; color: rgba(255,255,255,.45);
      margin-top: 3px; text-transform: uppercase; letter-spacing: .5px;
    }

    /* ── FILTER TABS ── */
    .filter-tabs {
      display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .tab-btn {
      padding: 6px 14px; border-radius: 20px; font-size: .78rem; font-weight: 600;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--muted); cursor: pointer; transition: all .18s;
    }
    .tab-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
    .tab-btn:hover:not(.active) { border-color: var(--blue); color: var(--blue); }

    /* ── REMINDER CARD ── */
    .rem-item {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 0;
      margin-bottom: 10px; box-shadow: var(--shadow);
      overflow: hidden; transition: border-color .2s, box-shadow .2s;
      animation: slideIn .25s ease both;
    }
    .rem-item:hover { border-color: var(--blue); box-shadow: var(--shadow-md); }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* colored left accent bar */
    .rem-item-inner {
      display: flex; gap: 0; align-items: stretch;
    }
    .rem-accent {
      width: 4px; flex-shrink: 0; border-radius: 0;
      background: var(--blue);
    }
    .rem-accent.warn  { background: var(--amber); }
    .rem-accent.ok    { background: var(--green); }
    .rem-accent.purple{ background: var(--purple); }

    .rem-body { flex: 1; padding: 14px 14px 14px 16px; }

    .rem-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px; margin-bottom: 10px;
    }
    .rem-name-row { display: flex; align-items: center; gap: 8px; }
    .rem-pill-icon {
      width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
      background: rgba(42,108,246,.1);
      display: flex; align-items: center; justify-content: center;
    }
    .rem-pill-icon svg { width:15px;height:15px;stroke:var(--blue);fill:none;stroke-width:2; }
    .rem-name {
      font-weight: 700; font-size: .95rem; color: var(--text);
    }
    .rem-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .rem-action-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: 7px; font-size: .75rem; font-weight: 700;
      cursor: pointer; border: 1.5px solid; transition: all .18s;
      font-family: 'DM Sans', sans-serif;
    }
    .rem-action-btn svg { width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5; }
    .btn-edit {
      background: rgba(42,108,246,.08); border-color: rgba(42,108,246,.25);
      color: var(--blue);
    }
    .btn-edit:hover { background: rgba(42,108,246,.16); border-color: var(--blue); }
    .btn-delete {
      background: rgba(242,92,125,.07); border-color: rgba(242,92,125,.25);
      color: var(--rose);
    }
    .btn-delete:hover { background: rgba(242,92,125,.15); border-color: var(--rose); }

    /* chips row */
    .rem-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px;
      font-size: .7rem; font-weight: 700;
    }
    .chip svg { width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2; }
    .chip-blue   { background: #eff6ff; color: var(--blue); }
    .chip-amber  { background: #fff8ec; color: var(--amber); }
    .chip-green  { background: #edfdf4; color: var(--green); }
    .chip-purple { background: #f3efff; color: var(--purple); }
    body.dark .chip-blue   { background: rgba(42,108,246,.15); color: #7aafff; }
    body.dark .chip-amber  { background: rgba(244,160,53,.15);  color: #fbbf6a; }
    body.dark .chip-green  { background: rgba(34,208,122,.15);  color: #4ade80; }
    body.dark .chip-purple { background: rgba(130,80,255,.15);  color: #c4b5fd; }

    /* time slots */
    .rem-times { display: flex; flex-wrap: wrap; gap: 5px; }
    .time-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; padding: 4px 10px;
      font-size: .75rem; font-weight: 600; color: var(--text);
    }
    .time-badge svg { width:11px;height:11px;stroke:var(--muted);fill:none;stroke-width:2; }

    /* ── EMPTY STATE ── */
    .empty-wrap {
      text-align: center; padding: 50px 20px;
      background: var(--surface); border: 1.5px dashed var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
    }
    .empty-icon-wrap {
      width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 16px;
      background: #eff6ff; display: flex; align-items: center; justify-content: center;
    }
    body.dark .empty-icon-wrap { background: rgba(42,108,246,.12); }
    .empty-icon-wrap svg { width:28px;height:28px;stroke:var(--blue);fill:none;stroke-width:1.6; }
    .empty-title {
      font-family: 'Fraunces', serif; font-size: 1.1rem;
      font-weight: 700; color: var(--text); margin-bottom: 6px;
    }
    .empty-sub { font-size: .84rem; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 24px; border-radius: 10px;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #fff; font-weight: 700; font-size: .9rem;
      box-shadow: 0 4px 16px rgba(42,108,246,.3);
      transition: all .2s; border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .empty-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(42,108,246,.4); }
    .empty-cta svg { width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.2; }

    /* ── LOADING ── */
    .loading-wrap {
      text-align: center; padding: 48px 20px; color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%; margin: 0 auto 14px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ADD NEW BUTTON (sticky bottom) ── */
    .sticky-add {
      position: fixed; bottom: 20px; right: 20px; z-index: 50;
      display: flex; align-items: center; gap: 8px;
      padding: 13px 20px; border-radius: 99px;
      background: linear-gradient(135deg, var(--blue), var(--blue-lt));
      color: #fff; font-weight: 700; font-size: .88rem;
      box-shadow: 0 4px 20px rgba(42,108,246,.4);
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .sticky-add:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(42,108,246,.5); }
    .sticky-add svg { width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #166534; color: #fff; border-radius: 10px;
      padding: 10px 18px; font-size: .84rem; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,.2); z-index: 9999;
      animation: toastIn .3s ease;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(8px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="dashboard.html" class="back-btn">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    Dashboard
  </a>
  <div class="topbar-title">Saved Reminders</div>
  <a href="reminder.html" class="add-btn">
    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    Add New
  </a>
</header>

<main class="page">

  <!-- HEADER CARD -->
  <div class="header-card">
    <div class="hc-top">
      <div class="hc-icon">
        <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div>
        <div class="hc-title">My Reminders</div>
        <div class="hc-sub">All your medicine schedules</div>
      </div>
    </div>
    <div class="hc-stats">
      <div class="hc-stat"><div class="hc-stat-val" id="statTotal">—</div><div class="hc-stat-lbl">Total</div></div>
      <div class="hc-stat"><div class="hc-stat-val" id="statActive">—</div><div class="hc-stat-lbl">Active</div></div>
      <div class="hc-stat"><div class="hc-stat-val" id="statToday">—</div><div class="hc-stat-lbl">Today</div></div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <button class="tab-btn active" onclick="filterReminders('all', this)">All</button>
    <button class="tab-btn" onclick="filterReminders('daily', this)">Daily</button>
    <button class="tab-btn" onclick="filterReminders('alternate', this)">Alternate</button>
    <button class="tab-btn" onclick="filterReminders('weekly', this)">Weekly</button>
    <button class="tab-btn" onclick="filterReminders('monthly', this)">Monthly</button>
  </div>

  <!-- REMINDER LIST -->
  <div id="reminderList">
    <div class="loading-wrap">
      <div class="spinner"></div>
      Loading your reminders…
    </div>
  </div>

</main>



<script>
const BASE = "http://localhost:3006";
const user = JSON.parse(localStorage.getItem("dhas_user") || "{}");
if (!user || !user.id) window.location.href = "login.html";

if (localStorage.getItem("dhas_theme") === "dark") document.body.classList.add("dark");

let allReminders  = [];
let currentFilter = "all";

/* ── Schedule helpers ── */
const SCHED_LABELS = {
  daily:      "Every Day",
  alternate:  "Alternate Days",
  weekly:     "Once a Week",
  twice_week: "Twice a Week",
  three_week: "3x a Week",
  monthly:    "Monthly",
  custom:     "Custom"
};
const DAYS_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function accentClass(i) {
  const classes = ["", "warn", "ok", "purple", "", "warn", "ok"];
  return classes[i % classes.length];
}

function chipColor(sched) {
  if (sched === "daily")      return "chip-green";
  if (sched === "alternate")  return "chip-amber";
  if (sched === "monthly")    return "chip-purple";
  return "chip-blue";
}

function buildRemCard(r, i) {
  const name    = r.medicine || "Medication";
  const sched   = r.sched || "daily";
  const schedLbl= r.scheduleLabel || SCHED_LABELS[sched] || sched;
  const doseLbl = r.dosesLabel || r.doses_label || "";
  const dur     = r.duration === "forever" ? "Ongoing" : `${r.duration} day(s)`;
  const times   = (r.times || []);
  const accent  = accentClass(i);
  const chipCol = chipColor(sched);

  // Day chips for weekly/custom
  const dayChips = (r.days || []).length
    ? r.days.map(d => `<span class="chip chip-blue">${DAYS_SHORT[d]}</span>`).join("")
    : "";

  // Time badges
  const timeBadges = times.map(t => {
    const display = t.display || `${t.h}:${t.m} ${t.ampm}`;
    return `<span class="time-badge">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span>${t.label}: ${display}</span>
    </span>`;
  }).join("");

  return `
    <div class="rem-item" id="remCard_${r.id}">
      <div class="rem-item-inner">
        <div class="rem-accent ${accent}"></div>
        <div class="rem-body">
          <div class="rem-top">
            <div class="rem-name-row">
              <div class="rem-pill-icon">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
              </div>
              <span class="rem-name">${name}</span>
            </div>
            <div class="rem-actions">
              <button class="rem-action-btn btn-edit" onclick="editReminder(${r.id})" title="Edit in full reminder page">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                Edit
              </button>
              <button class="rem-action-btn btn-delete" onclick="deleteReminder(${r.id})" title="Delete">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Delete
              </button>
            </div>
          </div>

          <div class="rem-chips">
            <span class="chip ${chipCol}">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              ${schedLbl}
            </span>
            ${doseLbl ? `<span class="chip chip-blue">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              ${doseLbl}
            </span>` : ""}
            <span class="chip chip-purple">
              <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              ${dur}
            </span>
            ${dayChips}
          </div>

          ${times.length ? `<div class="rem-times">${timeBadges}</div>` : ""}
        </div>
      </div>
    </div>`;
}

function renderList(reminders) {
  const list = document.getElementById("reminderList");
  if (!reminders.length) {
    const isFiltered = currentFilter !== "all";
    list.innerHTML = `
      <div class="empty-wrap">
        <div class="empty-icon-wrap">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div class="empty-title">${isFiltered ? "No reminders in this category" : "No reminders yet"}</div>
        <div class="empty-sub">${isFiltered
          ? "Try a different filter or add a new reminder."
          : "Stay on top of your medication by adding your first reminder."}</div>
        <button class="empty-cta" onclick="window.location.href='reminder.html'">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Add First Reminder
        </button>
      </div>`;
    return;
  }
  list.innerHTML = reminders.map((r, i) => buildRemCard(r, i)).join("");
}

function updateStats(reminders) {
  const now     = new Date();
  const todayDow = now.getDay();
  const todayDom = now.getDate();

  const activeCount = reminders.filter(r => r.duration === "forever" || !r.duration).length;
  const todayCount  = reminders.filter(r => {
    const s = r.sched || "daily";
    if (s === "daily")      return true;
    if (s === "alternate")  return true;
    if (["weekly","twice_week","three_week","custom"].includes(s))
      return (r.days || []).includes(todayDow);
    if (s === "monthly")    return todayDom === (r.monthDay || 1);
    return false;
  }).length;

  document.getElementById("statTotal").textContent  = reminders.length;
  document.getElementById("statActive").textContent = activeCount;
  document.getElementById("statToday").textContent  = todayCount;
}

function filterReminders(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  const filtered = filter === "all"
    ? allReminders
    : allReminders.filter(r => {
        const s = r.sched || "daily";
        if (filter === "daily")     return s === "daily";
        if (filter === "alternate") return s === "alternate";
        if (filter === "weekly")    return ["weekly","twice_week","three_week"].includes(s);
        if (filter === "monthly")   return s === "monthly";
        return true;
      });
  renderList(filtered);
}

async function loadReminders() {
  try {
    const res  = await fetch(`${BASE}/reminders/${user.id}`);
    const data = await res.json();
    if (data.success) {
      allReminders = data.data || [];
    }
  } catch (e) {
    console.error("Load reminders failed:", e);
  }
  updateStats(allReminders);
  renderList(allReminders);
}

async function deleteReminder(id) {
  if (!confirm("Delete this reminder?")) return;
  try {
    const res  = await fetch(`${BASE}/reminders/delete/${id}`, { method: "DELETE" });
    const data = await res.json();
    if (data.success) {
      allReminders = allReminders.filter(r => r.id !== id);
      const card = document.getElementById(`remCard_${id}`);
      if (card) {
        card.style.transition = "opacity .25s, transform .25s";
        card.style.opacity    = "0";
        card.style.transform  = "translateX(20px)";
        setTimeout(() => {
          filterReminders(currentFilter, document.querySelector(".tab-btn.active"));
          updateStats(allReminders);
          showToast("Reminder deleted");
        }, 260);
      }
    } else {
      alert("Could not delete reminder.");
    }
  } catch (e) {
    alert("Network error — could not delete.");
  }
}

function editReminder(id) {
  // Navigate to reminder page — the full reminder.html has edit functionality
  window.location.href = `reminder.html`;
}

function showToast(msg) {
  const t = document.createElement("div");
  t.className   = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

loadReminders();
</script>
</body>
</html>
