<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symptoms - DHAS</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0b1437;--navy-mid:#112057;--blue:#2a6cf6;--teal:#00c9b1}
body{font-family:'DM Sans',sans-serif}
.dhas-navbar{background:linear-gradient(145deg,var(--navy-mid) 0%,var(--navy) 100%);border-bottom:none;backdrop-filter:none;height:62px}
.page-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700}
.btn-dhas.primary{background:linear-gradient(135deg,var(--blue),#4f8ef9);border-radius:12px}
.dhas-alert.info{background:#eff6ff;border-left:4px solid var(--blue);color:#1d4ed8}
</style>
</head>
<body>

  <nav class="dhas-navbar">
    <div class="brand">🏥 DHAS</div>
    <a href="dashboard.html" style="color:#fff;font-size:0.85rem;text-decoration:none;opacity:0.85;">← Dashboard</a>
  </nav>

  <div class="page-wrap">

    <h2 class="page-title">
      <span class="emoji">🩺</span>
      Select Your Symptoms
    </h2>

    <div class="dhas-alert info">
      Select all symptoms you are currently experiencing.
    </div>

    <div id="symptomList">

      <div class="symptom-item" onclick="toggleCheck(this, 'fever')">
        <input class="form-check-input" type="checkbox" value="fever" id="fever">
        <label for="fever" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">🌡️</span>
          <div>
            <div class="symptom-text">Fever</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">High body temperature</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'cold')">
        <input type="checkbox" value="cold" id="cold">
        <label for="cold" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">🤧</span>
          <div>
            <div class="symptom-text">Cold / Runny Nose</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Nasal congestion, sneezing</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'headache')">
        <input type="checkbox" value="headache" id="headache">
        <label for="headache" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">🤕</span>
          <div>
            <div class="symptom-text">Headache</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Pain or pressure in the head</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'cough')">
        <input type="checkbox" value="cough" id="cough">
        <label for="cough" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">😮‍💨</span>
          <div>
            <div class="symptom-text">Cough</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Dry or wet cough</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'fatigue')">
        <input type="checkbox" value="fatigue" id="fatigue">
        <label for="fatigue" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">😴</span>
          <div>
            <div class="symptom-text">Fatigue / Tiredness</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Unusual weakness or exhaustion</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'body_pain')">
        <input type="checkbox" value="body_pain" id="body_pain">
        <label for="body_pain" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">💪</span>
          <div>
            <div class="symptom-text">Body Pain / Ache</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Muscle or joint pain</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'sore_throat')">
        <input type="checkbox" value="sore_throat" id="sore_throat">
        <label for="sore_throat" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">🗣️</span>
          <div>
            <div class="symptom-text">Sore Throat</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Pain or irritation in throat</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'nausea')">
        <input type="checkbox" value="nausea" id="nausea">
        <label for="nausea" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">🤢</span>
          <div>
            <div class="symptom-text">Nausea / Vomiting</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Feeling sick or throwing up</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'diarrhea')">
        <input type="checkbox" value="diarrhea" id="diarrhea">
        <label for="diarrhea" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">🚽</span>
          <div>
            <div class="symptom-text">Diarrhea / Loose Motion</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Frequent loose or watery stools</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'loss_of_taste')">
        <input type="checkbox" value="loss_of_taste" id="loss_of_taste">
        <label for="loss_of_taste" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">👅</span>
          <div>
            <div class="symptom-text">Loss of Taste / Smell</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Cannot taste or smell normally</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'chest_pain')">
        <input type="checkbox" value="chest_pain" id="chest_pain">
        <label for="chest_pain" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">💔</span>
          <div>
            <div class="symptom-text">Chest Pain</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Tightness or pain in chest</div>
          </div>
        </label>
      </div>

      <div class="symptom-item" onclick="toggleCheck(this, 'breathlessness')">
        <input type="checkbox" value="breathlessness" id="breathlessness">
        <label for="breathlessness" style="display:flex;align-items:center;gap:10px;cursor:pointer;width:100%">
          <span style="font-size:1.4rem;">😤</span>
          <div>
            <div class="symptom-text">Breathlessness</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">Difficulty breathing or shortness of breath</div>
          </div>
        </label>
      </div>

    </div>

    <div id="selectedCount" class="text-muted text-center mt-12 mb-16" style="font-size:0.88rem;"></div>

    <button class="btn-dhas primary" onclick="submitSymptoms()">Check My Condition →</button>
    <button class="btn-dhas secondary mt-12" onclick="window.location.href='dashboard.html'">Back</button>

  </div>

  <script src="js/symptom.js"></script>

</body>
</html>
