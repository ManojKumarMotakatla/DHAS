<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - DHAS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="dhas-navbar">
    <div class="brand">🏥 DHAS <span>| Health Assistant</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="nav-user" id="userGreet"></span>
      <button class="nav-logout" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrap">

    <p class="text-muted mt-8 mb-16 text-center" id="dateDisplay"></p>

    <div class="dash-grid">

      <a href="symptom.html" class="dash-tile">
        <span class="tile-icon">🩺</span>
        <span class="tile-label">Symptoms</span>
      </a>

      <a href="reports.html" class="dash-tile">
        <span class="tile-icon">📋</span>
        <span class="tile-label">Reports</span>
      </a>

      <a href="diet.html" class="dash-tile">
        <span class="tile-icon">🥗</span>
        <span class="tile-label">Diet</span>
      </a>

      <a href="remedies.html" class="dash-tile">
        <span class="tile-icon">🌿</span>
        <span class="tile-label">Remedies</span>
      </a>

      <a href="reminder.html" class="dash-tile">
        <span class="tile-icon">💊</span>
        <span class="tile-label">Reminders</span>
      </a>

      <a href="steps.html" class="dash-tile">
        <span class="tile-icon">👟</span>
        <span class="tile-label">Steps</span>
      </a>

      <a href="language.html" class="dash-tile full">
        <span class="tile-icon">🌐</span>
        <span class="tile-label">Change Language</span>
      </a>

    </div>

    <p class="text-center text-muted" style="font-size:0.78rem;margin-top:10px;">
      ⚠️ For informational purposes only. Not a substitute for professional medical advice.
    </p>

  </div>

  <script>
    // Show user greeting
    const user = JSON.parse(localStorage.getItem("dhas_user")) || {};
    if (user.name) {
      document.getElementById("userGreet").textContent = "Hi, " + user.name.split(" ")[0];
    }

    // Show date
    const now = new Date();
    document.getElementById("dateDisplay").textContent = now.toLocaleDateString("en-IN", {
      weekday: "long", year: "numeric", month: "long", day: "numeric"
    });

    function handleLogout() {
      if (confirm("Are you sure you want to logout?")) {
        localStorage.removeItem("dhas_user");
        window.location.href = "login.html";
      }
    }
  </script>

</body>
</html>
