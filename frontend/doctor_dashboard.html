<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard — DHAS</title>
  <script src="js/config.js"></script>
  <script src="theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root{--teal:#00c9b1;--green:#059669;--navy:#064e3b;--navy-mid:#065f46;--bg:#f0fdf4;--surface:#ffffff;--border:#d1fae5;--text:#064e3b;--muted:#6b9a8a;--blue:#2a6cf6;--rose:#f25c7d;--amber:#f4a035;--radius:18px;--shadow:0 2px 20px rgba(5,150,105,.09);}
    html.dark body,body.dark{--bg:#031a10;--surface:#052e1a;--border:#0a4a28;--text:#c8f5e5;--muted:#4a9a7a;--shadow:0 2px 20px rgba(0,0,0,.35);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .35s,color .35s;}
    a{text-decoration:none;color:inherit;}

    .topbar{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;padding:0 20px;gap:12px;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);transition:background .35s;}
    body.dark .topbar{background:rgba(3,26,16,.92);}
    .topbar-brand{font-family:'Fraunces',serif;font-weight:700;font-size:1.1rem;color:var(--green);display:flex;align-items:center;gap:8px;}
    .brand-dot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--teal));}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .doctor-badge{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.78rem;font-weight:700;color:var(--green);}
    .doctor-badge i{font-size:14px;}
    .logout-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
    .logout-btn:hover{border-color:var(--rose);color:var(--rose);}

    .page{max-width:700px;margin:0 auto;padding:20px 16px 60px;}

    .hero-card{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 60%,#059669 100%);border-radius:22px;padding:28px 24px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(6,78,59,.3);}
    .hero-card::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(0,201,177,.25),transparent 70%);pointer-events:none;}
    .hero-greeting{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.55);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
    .hero-name{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:700;color:#fff;margin-bottom:4px;}
    .hero-spec{font-size:.88rem;color:rgba(255,255,255,.6);margin-bottom:18px;}
    .invite-box{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .invite-label{font-size:.72rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;}
    .invite-code{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:2px;}
    .copy-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:7px 14px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px;transition:all .2s;}
    .copy-btn:hover{background:rgba(255,255,255,.25);}
    .invite-hint{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:8px;}

    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
    .stat-val{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:var(--green);}
    .stat-lbl{font-size:.66rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}

    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .sec-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;color:var(--text);}

    .patient-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .2s,transform .18s,box-shadow .18s;display:flex;align-items:center;gap:14px;}
    .patient-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 6px 24px rgba(5,150,105,.14);}
    .patient-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;color:#fff;flex-shrink:0;}
    .patient-name{font-weight:700;font-size:.95rem;color:var(--text);margin-bottom:3px;}
    .patient-meta{font-size:.75rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;}
    .patient-meta span{display:flex;align-items:center;gap:3px;}
    .patient-meta i{font-size:12px;}
    .patient-arrow{margin-left:auto;color:var(--muted);font-size:1.2rem;}
    .patient-card:hover .patient-arrow{color:var(--green);}

    .empty-box{text-align:center;padding:40px 20px;background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);}
    .empty-box i{font-size:48px;opacity:.3;display:block;margin-bottom:12px;color:var(--green);}
    .empty-box p{font-size:.88rem;color:var(--muted);line-height:1.6;}

    /* PATIENT DETAIL PANEL */
    #patientDetail{display:none;animation:fadeUp .35s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .detail-back{display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:600;color:var(--muted);padding:8px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);cursor:pointer;margin-bottom:16px;width:fit-content;transition:all .18s;}
    .detail-back:hover{color:var(--green);border-color:var(--green);}
    .detail-header{background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:20px;padding:22px 20px;margin-bottom:16px;position:relative;overflow:hidden;}
    .detail-header::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(0,201,177,.2),transparent 70%);pointer-events:none;}
    .detail-name{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:4px;position:relative;}
    .detail-email{font-size:.8rem;color:rgba(255,255,255,.5);position:relative;}
    .detail-vitals{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;}
    .vital-chip{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px;}
    .vital-chip i{font-size:12px;opacity:.7;}

    .info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);}
    .info-card-title{font-family:'Fraunces',serif;font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
    .info-card-title i{font-size:17px;color:var(--green);}

    .sym-row{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;}
    .sym-row:last-child{border-bottom:none;}
    .sym-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .sym-cond{font-weight:700;font-size:.88rem;color:var(--text);}
    .sym-date{font-size:.72rem;color:var(--muted);margin-top:2px;}
    .sev-tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:.7rem;font-weight:700;margin-left:6px;}
    .sev-high{background:#fee2e2;color:#991b1b;}
    .sev-medium{background:#fef3c7;color:#92400e;}
    .sev-low{background:#d1fae5;color:#065f46;}

    .report-row{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .report-row:last-child{border-bottom:none;}
    .report-row i{font-size:20px;color:var(--blue);}
    .report-name{font-weight:600;font-size:.88rem;color:var(--text);word-break:break-all;}
    .report-date{font-size:.72rem;color:var(--muted);}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#d1fae5;border:1.5px solid #6ee7b7;color:#065f46;padding:11px 20px;border-radius:12px;font-size:.85rem;font-weight:600;display:none;z-index:9999;white-space:nowrap;}
  </style>
</head>
<body>

<div id="toast"></div>

<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-dot"></div>
    DHAS Doctor
  </div>
  <div class="topbar-right">
    <div class="doctor-badge"><i class="ti ti-stethoscope"></i><span id="topbarName">Doctor</span></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</header>

<main class="page">

  <!-- PATIENT LIST VIEW -->
  <div id="listView">
    <div class="hero-card">
      <div class="hero-greeting">Welcome back</div>
      <div class="hero-name" id="heroName">Dr. Loading…</div>
      <div class="hero-spec" id="heroSpec">General Physician</div>
      <div class="invite-box">
        <div>
          <div class="invite-label">Your Patient Invite Code</div>
          <div class="invite-code" id="inviteCode">DR-XXXXXX</div>
          <div class="invite-hint">Share this code with patients so they can connect to you</div>
        </div>
        <button class="copy-btn" onclick="copyCode()">
          <i class="ti ti-copy" style="font-size:13px"></i> Copy
        </button>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val" id="statPat">0</div><div class="stat-lbl">Patients</div></div>
      <div class="stat-card"><div class="stat-val" id="statSym">0</div><div class="stat-lbl">Symptoms Logged</div></div>
      <div class="stat-card"><div class="stat-val" id="statRep">0</div><div class="stat-lbl">Reports Shared</div></div>
    </div>

    <div class="section-head">
      <div class="sec-title">Connected Patients</div>
    </div>
    <div id="patientList">
      <div style="text-align:center;padding:30px;color:var(--muted);">Loading patients…</div>
    </div>
  </div>

  <!-- PATIENT DETAIL VIEW -->
  <div id="patientDetail">
    <button class="detail-back" onclick="showList()">
      <i class="ti ti-chevron-left" style="font-size:15px"></i> Back to Patients
    </button>
    <div id="detailContent"></div>
  </div>

</main>

<script>
const doctor = JSON.parse(localStorage.getItem("dhas_doctor") || "{}");
if (!doctor || !doctor.id) window.location.href = "doctor_login.html";

function getDoctorHeaders() {
  const token = localStorage.getItem("dhas_doctor_token");
  return { "Content-Type": "application/json", "Authorization": "Bearer " + (token || "") };
}

function logout() {
  if (!confirm("Log out?")) return;
  localStorage.removeItem("dhas_doctor");
  localStorage.removeItem("dhas_doctor_token");
  window.location.href = "doctor_login.html";
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.style.display = "none"; }, 3000);
}

function copyCode() {
  const code = document.getElementById("inviteCode").textContent;
  navigator.clipboard.writeText(code).then(() => showToast("✓ Invite code copied!")).catch(() => {});
}

// ── Load doctor profile ────────────────────────────────────
async function loadProfile() {
  const res  = await fetch(window.API_BASE + "/doctor/profile", { headers: getDoctorHeaders() }).then(r => r.json()).catch(() => ({}));
  const d    = res.doctor || doctor;
  document.getElementById("heroName").textContent   = "Dr. " + (d.name || "");
  document.getElementById("heroSpec").textContent   = d.speciality || "";
  document.getElementById("inviteCode").textContent = d.invite_code || doctor.invite_code || "";
  document.getElementById("topbarName").textContent = "Dr. " + (d.name || "").split(" ")[0];
}

// ── Load patients ──────────────────────────────────────────
async function loadPatients() {
  const res = await fetch(window.API_BASE + "/doctor/patients", { headers: getDoctorHeaders() }).then(r => r.json()).catch(() => ({ success: false, data: [] }));

  const patients = res.success ? (res.data || []) : [];
  const totalSym = patients.reduce((s, p) => s + (parseInt(p.symptom_count) || 0), 0);
  const totalRep = patients.reduce((s, p) => s + (parseInt(p.report_count)  || 0), 0);
  document.getElementById("statPat").textContent = patients.length;
  document.getElementById("statSym").textContent = totalSym;
  document.getElementById("statRep").textContent = totalRep;

  const list = document.getElementById("patientList");
  if (!patients.length) {
    list.innerHTML = `<div class="empty-box">
      <i class="ti ti-users" aria-hidden="true"></i>
      <p>No patients connected yet.<br>Share your invite code with patients and ask them to enter it in their Profile page under "Connect to Doctor".</p>
    </div>`;
    return;
  }

  list.innerHTML = patients.map(p => {
    const initials = (p.name || "P").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
    const connDate = new Date(p.connected_at).toLocaleDateString("en-IN", { day:"numeric", month:"short", year:"numeric" });
    return `<div class="patient-card" onclick="loadPatientDetail(${p.id})">
      <div class="patient-avatar">${initials}</div>
      <div style="flex:1;min-width:0;">
        <div class="patient-name">${p.name}</div>
        <div class="patient-meta">
          <span><i class="ti ti-mail"></i>${p.email}</span>
          ${p.blood_group ? `<span><i class="ti ti-droplet"></i>${p.blood_group}</span>` : ""}
          <span><i class="ti ti-notes"></i>${p.symptom_count} symptoms</span>
          <span><i class="ti ti-file"></i>${p.report_count} reports</span>
        </div>
      </div>
      <i class="ti ti-chevron-right patient-arrow"></i>
    </div>`;
  }).join("");
}

// ── Patient detail ─────────────────────────────────────────
async function loadPatientDetail(patientId) {
  document.getElementById("listView").style.display    = "none";
  document.getElementById("patientDetail").style.display = "block";
  document.getElementById("detailContent").innerHTML   = `<div style="text-align:center;padding:40px;color:var(--muted);">Loading patient data…</div>`;

  const res = await fetch(`${window.API_BASE}/doctor/patients/${patientId}`, { headers: getDoctorHeaders() }).then(r => r.json()).catch(() => ({}));

  if (!res.success) {
    document.getElementById("detailContent").innerHTML = `<div style="text-align:center;padding:40px;color:#f25c7d;">Failed to load patient data.</div>`;
    return;
  }

  const { profile, symptoms, reports } = res;
  const initials = (profile.name || "P").split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);

  const vitals = [
    profile.blood_group ? `<div class="vital-chip"><i class="ti ti-droplet"></i>${profile.blood_group}</div>` : "",
    profile.height      ? `<div class="vital-chip"><i class="ti ti-ruler"></i>${profile.height} cm</div>` : "",
    profile.weight      ? `<div class="vital-chip"><i class="ti ti-scale"></i>${profile.weight} kg</div>` : "",
    profile.gender      ? `<div class="vital-chip"><i class="ti ti-user"></i>${profile.gender}</div>` : "",
    profile.conditions && profile.conditions !== "None"
      ? `<div class="vital-chip"><i class="ti ti-alert-circle"></i>${profile.conditions}</div>` : "",
  ].filter(Boolean).join("");

  const symptomsHTML = symptoms.length ? symptoms.map(s => {
    const level = (s.severity || "low").toLowerCase().includes("high") ? "high"
                : (s.severity || "low").toLowerCase().includes("medium") ? "medium" : "low";
    const dotColor = level === "high" ? "#ef4444" : level === "medium" ? "#f59e0b" : "#10b981";
    const syms = (() => { try { return JSON.parse(s.symptoms).join(", "); } catch { return s.symptoms; } })();
    return `<div class="sym-row">
      <div class="sym-dot" style="background:${dotColor}"></div>
      <div>
        <div class="sym-cond">${s.condition_name || "General"}
          <span class="sev-tag sev-${level}">${s.severity}</span>
        </div>
        <div class="sym-date">${new Date(s.created_at).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})} · ${syms}</div>
      </div>
    </div>`;
  }).join("") : `<p style="font-size:.85rem;color:var(--muted);padding:10px 0;">No symptom records found.</p>`;

  const reportsHTML = reports.length ? reports.map(r => {
    const icon = r.filetype === "application/pdf" ? "ti-file-type-pdf" : r.filetype?.startsWith("image/") ? "ti-photo" : "ti-file";
    return `<div class="report-row">
      <i class="ti ${icon}"></i>
      <div>
        <div class="report-name">${r.filename}</div>
        <div class="report-date">${new Date(r.uploaded_at).toLocaleDateString("en-IN")} · ${r.filesize}</div>
      </div>
    </div>`;
  }).join("") : `<p style="font-size:.85rem;color:var(--muted);padding:10px 0;">No reports uploaded.</p>`;

  document.getElementById("detailContent").innerHTML = `
    <div class="detail-header">
      <div class="detail-name">${profile.name}</div>
      <div class="detail-email">${profile.email}${profile.phone ? " · " + profile.phone : ""}</div>
      <div class="detail-vitals">${vitals || '<div class="vital-chip">No vitals on record</div>'}</div>
    </div>

    <div class="info-card">
      <div class="info-card-title"><i class="ti ti-notes"></i>Symptom History</div>
      ${symptomsHTML}
    </div>

    <div class="info-card">
      <div class="info-card-title"><i class="ti ti-folder-open"></i>Medical Reports</div>
      ${reportsHTML}
    </div>`;
}

function showList() {
  document.getElementById("patientDetail").style.display = "none";
  document.getElementById("listView").style.display      = "block";
}

loadProfile();
loadPatients();
</script>
</body>
</html>
