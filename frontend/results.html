<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - DHAS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="dhas-navbar">
    <div class="brand">🏥 DHAS</div>
    <a href="symptom.html" style="color:#fff;font-size:0.85rem;text-decoration:none;opacity:0.85;">← Symptoms</a>
  </nav>

  <div class="page-wrap">

    <h2 class="page-title">
      <span class="emoji">📊</span>
      Your Results
    </h2>

    <!-- Severity Alert Box -->
    <div id="alertBox" class="dhas-alert info">Analysing your symptoms...</div>

    <div class="dhas-card">

      <div class="result-section">
        <div class="result-label">Your Symptoms</div>
        <div id="symptomDisplay" class="result-value">—</div>
      </div>

      <hr class="dhas-divider">

      <div class="result-section">
        <div class="result-label">Likely Condition</div>
        <div id="conditionDisplay" class="result-value">—</div>
      </div>

      <hr class="dhas-divider">

      <div class="result-section">
        <div class="result-label">Severity Level</div>
        <div id="severityDisplay">—</div>
      </div>

      <hr class="dhas-divider">

      <div class="result-section">
        <div class="result-label">Recommendation</div>
        <div id="suggestionDisplay" class="result-value">—</div>
      </div>

    </div>

    <!-- Quick Links -->
    <div class="dash-grid mt-16">
      <a href="diet.html" class="dash-tile">
        <span class="tile-icon">🥗</span>
        <span class="tile-label">Diet Tips</span>
      </a>
      <a href="remedies.html" class="dash-tile">
        <span class="tile-icon">🌿</span>
        <span class="tile-label">Remedies</span>
      </a>
    </div>

    <button class="btn-dhas secondary mt-8" onclick="window.location.href='symptom.html'">← Check Again</button>
    <button class="btn-dhas primary mt-12" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>

    <p class="text-center text-muted mt-16" style="font-size:0.78rem;">
      ⚠️ This is not a medical diagnosis. Please consult a doctor for professional advice.
    </p>

  </div>

  <script src="js/severity.js"></script>

</body>
</html>
