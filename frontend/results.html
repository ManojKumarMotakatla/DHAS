<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Digital Health Assistant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-4">

        <h3 class="text-center mb-4">Results</h3>

        <div class="card p-3 shadow-sm">

            <p><strong>Selected Symptoms:</strong></p>
            <p id="symptomList"></p>

            <hr>

            <p><strong>Severity:</strong></p>
            <p id="severity"></p>

            <hr>

            <p><strong>Suggestions:</strong></p>
            <p id="suggestions"></p>

        </div>

        <button class="btn btn-primary w-100 mt-3" onclick="goBack()">Back</button>

    </div>

    <!-- JS -->
    <script src="js/severity.js"></script>

</body>
</html>
