<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Reports - Digital Health Assistant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-4">

        <h3 class="text-center mb-4">Medical Reports</h3>

        <form id="reportForm">

            <div class="mb-3">
                <label class="form-label">Upload Report</label>
                <input type="file" class="form-control" id="reportFile" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Upload</button>

        </form>

        <div class="mt-4">
            <h5>Uploaded Reports</h5>
            <ul id="reportList" class="list-group"></ul>
        </div>

        <button class="btn btn-primary w-100 mt-3" onclick="goBack()">Back</button>

    </div>

    <!-- JS -->
    <script src="js/report.js"></script>

</body>
</html>
