<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical Reports - DHAS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="dhas-navbar">
    <div class="brand">🏥 DHAS</div>
    <a href="dashboard.html" style="color:#fff;font-size:0.85rem;text-decoration:none;opacity:0.85;">← Dashboard</a>
  </nav>

  <div class="page-wrap">

    <!-- ── LIST SECTION (upload + list) ─────────────────────── -->
    <div id="listSection">

      <h2 class="page-title">
        <span class="emoji">📋</span>
        Medical Reports
      </h2>

      <!-- Upload Card -->
      <div class="dhas-card">
        <h5>📤 Upload Report</h5>
        <label class="dhas-label">Select File (PDF / Image, max 4 MB)</label>
        <input type="file" class="dhas-input" id="reportFile" accept=".pdf,.jpg,.jpeg,.png">
        <button id="uploadBtn" class="btn-dhas primary" onclick="uploadReport()">Upload Report</button>
      </div>

      <!-- Reports List -->
      <div>
        <h5 style="font-family:'Sora',sans-serif;margin-bottom:12px;">📁 Uploaded Reports</h5>
        <div id="reportList"></div>
      </div>

      <button class="btn-dhas secondary mt-12" onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>

    </div>

    <!-- ── VIEWER SECTION (shown when viewing a report) ──────── -->
    <div id="viewerSection" style="display:none;"></div>

  </div>

  <script src="js/report.js"></script>

</body>
</html>
