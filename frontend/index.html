<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHAS - Digital Health Assistant</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e53935">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div class="landing-wrap">

    <div class="landing-icon">🏥</div>

    <h1 class="landing-title">Digital Health<br>Assistant</h1>
    <p class="landing-sub">Your personal health companion — check symptoms, set reminders, track your wellness.</p>

    <div class="landing-features">
      <div class="landing-feature"><span>🩺</span>Symptoms</div>
      <div class="landing-feature"><span>💊</span>Reminders</div>
      <div class="landing-feature"><span>🥗</span>Diet</div>
      <div class="landing-feature"><span>👟</span>Steps</div>
    </div>

    <a href="login.html" class="btn-landing">Get Started →</a>

    <p class="mt-20" style="opacity:0.6; font-size:0.82rem;">
      For informational purposes only. Not a substitute for medical advice.
    </p>

  </div>
<script>
const CLIENT_ID = "935050379586-3vj8chtqv922uqmqurgknmtdseh0vlpv.apps.googleusercontent.com";

let accessToken = null;

function loginGoogleFit() {
    if (typeof google === "undefined" || !google.accounts) {
        alert("Google services are still loading. Please try again in a moment.");
        return;
    }
    google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: "https://www.googleapis.com/auth/fitness.activity.read",
        callback: async (response) => {
            accessToken = response.access_token;
            getTodaySteps();
        }
    }).requestAccessToken();
}

async function getTodaySteps() {

    const endTime = Date.now();
    const startTime = endTime - (24 * 60 * 60 * 1000);

    const response = await fetch(
        "https://www.googleapis.com/fitness/v1/users/me/dataset:aggregate",
        {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${accessToken}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                aggregateBy: [{
                    dataTypeName: "com.google.step_count.delta"
                }],
                bucketByTime: { durationMillis: 86400000 },
                startTimeMillis: startTime,
                endTimeMillis: endTime
            })
        }
    );

    const data = await response.json();

    console.log(data);

    let steps = 0;

    if (
        data.bucket &&
        data.bucket.length > 0 &&
        data.bucket[0].dataset.length > 0 &&
        data.bucket[0].dataset[0].point.length > 0
    ) {
        steps =
            data.bucket[0]
                .dataset[0]
                .point[0]
                .value[0]
                .intVal;
    }

    alert("Today's Steps: " + steps);
}
</script>
</body>
</html>
