<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Reminder - Digital Health Assistant</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container mt-4">

        <h3 class="text-center mb-4">Medicine Reminder</h3>

        <form id="reminderForm">

            <div class="mb-3">
                <label class="form-label">Medicine Name</label>
                <input type="text" class="form-control" id="medicine" placeholder="Enter medicine name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Time</label>
                <input type="time" class="form-control" id="time" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Set Reminder</button>

        </form>

        <div class="mt-4">
            <h5>Saved Reminders</h5>
            <ul id="reminderList" class="list-group"></ul>
        </div>

        <button class="btn btn-primary w-100 mt-3" onclick="goBack()">Back</button>

    </div>

    <!-- JS -->
    <script src="js/reminder.js"></script>

</body>
</html>
